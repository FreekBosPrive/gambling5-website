name: Deploy Gambling5.Api to Azure Functions

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore Gambling5.Api/Gambling5.Api.csproj

      - name: Build
        run: dotnet build Gambling5.Api/Gambling5.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Gambling5.Api/Gambling5.Api.csproj --configuration Release --output published_api --no-build

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: gambling5-api-prod
          package: published_api
          # Uses credentials from azure/login
