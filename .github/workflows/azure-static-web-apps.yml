# GitHub Actions workflow for Azure Static Web Apps
# This will build and deploy Gambling5.Web to gambling5-web on every push to master

name: Deploy Gambling5.Web to Azure Static Web Apps

on:
  push:
    branches:
      - master

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore Gambling5.Web/Gambling5.Web.csproj

      - name: Build
        run: dotnet build Gambling5.Web/Gambling5.Web.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Gambling5.Web/Gambling5.Web.csproj --configuration Release --output build_output --no-restore

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for GitHub integrations (e.g., PR comments)
          action: "upload"
          app_location: "build_output/wwwroot"
          api_location: ""
          output_location: "build_output/wwwroot"
          skip_app_build: true
          skip_api_build: true
          production_branch: "master"
          # Set your static web app name below
          static_web_app_name: "gambling5-web"
